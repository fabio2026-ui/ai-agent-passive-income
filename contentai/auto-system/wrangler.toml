name = "contentai-auto-system"
main = "api/index.js"
compatibility_date = "2024-01-01"

# 环境变量（本地开发）
[vars]
APP_URL = "https://contentai.yourdomain.com"
EMAIL_FROM = "noreply@contentai.com"

# 密钥（需要在 Cloudflare Dashboard 中设置）
[[env.production.vars]]
# MOONSHOT_API_KEY = "your_moonshot_api_key"
# COINBASE_API_KEY = "your_coinbase_api_key"
# COINBASE_WEBHOOK_SECRET = "your_coinbase_webhook_secret"
# NOWPAYMENTS_API_KEY = "your_nowpayments_api_key"
# RESEND_API_KEY = "your_resend_api_key"
# REDDIT_CLIENT_ID = "your_reddit_client_id"
# REDDIT_CLIENT_SECRET = "your_reddit_client_secret"
# TWITTER_BEARER_TOKEN = "your_twitter_bearer_token"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "contentai-db"
database_id = "your-database-id"

# 定时任务 - 每5分钟处理一次队列
triggers = [
  { cron = "*/5 * * * *" }
]

# 路由规则
routes = [
  { pattern = "contentai.yourdomain.com/*", zone_name = "yourdomain.com" }
]

# 日志配置
[logs]
custom_data = { app = "contentai" }

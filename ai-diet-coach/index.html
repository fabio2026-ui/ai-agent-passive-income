<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#10b981" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AI Diet Coach" />
    <meta name="description" content="AI驱动的个人饮食教练，智能营养分析与个性化饮食建议" />
    <meta name="keywords" content="饮食,营养,健康,减肥,健身,AI教练" />
    
    <!-- Performance Optimizations -->
    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://api.openai.com" />
    <link rel="dns-prefetch" href="https://api.openai.com" />
    <link rel="preconnect" href="https://api.stripe.com" />
    <link rel="dns-prefetch" href="https://api.stripe.com" />
    
    <!-- Preload critical fonts if using Google Fonts -->
    <!-- <link rel="preload" href="/fonts/critical-font.woff2" as="font" type="font/woff2" crossorigin > -->
    
    <!-- Resource hints -->
    <meta http-equiv="x-dns-prefetch-control" content="on" />
    
    <!-- PWA Icons -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <title>AI Diet Coach - 智能饮食教练</title>
    
    <!-- Critical CSS for above-the-fold content -->
    <style>
      /* Critical rendering path styles */
      html { background-color: #f9fafb; }
      body { 
        margin: 0; 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { min-height: 100vh; }
      /* Loading skeleton */
      .initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
      }
      .initial-loader__spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #10b981;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Initial loader for better perceived performance -->
      <div class="initial-loader" id="initial-loader">
        <div class="initial-loader__spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove initial loader when app is ready
      window.addEventListener('load', function() {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.3s ease';
          setTimeout(() => loader.remove(), 300);
        }
      });
    </script>
  </body>
</html>

openapi: 3.0.0
info:
  title: Sample E-Commerce API
  description: |
    A sample API for testing the security scanner.
    This API has intentional vulnerabilities for demonstration purposes.
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: https://api.example.com/v1
    description: Production server
  - url: https://staging-api.example.com/v1
    description: Staging server

security:
  - bearerAuth: []

paths:
  /products:
    get:
      summary: List all products
      description: Returns a paginated list of products
      tags:
        - Products
      parameters:
        - name: search
          in: query
          description: Search query string (XSS vulnerable)
          schema:
            type: string
        - name: category
          in: query
          description: Filter by category
          schema:
            type: string
        - name: sort
          in: query
          description: Sort field (SQLi vulnerable)
          schema:
            type: string
            default: name
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  meta:
                    type: object

    post:
      summary: Create a new product
      description: Create a new product (Admin only - missing auth check)
      tags:
        - Products
      security: []  # No authentication required!
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '201':
          description: Product created
        '400':
          description: Invalid input

  /products/{id}:
    get:
      summary: Get product by ID
      description: Returns a single product (IDOR vulnerable)
      tags:
        - Products
      parameters:
        - name: id
          in: path
          required: true
          description: Product ID
          schema:
            type: integer
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found

    put:
      summary: Update product
      description: Update product details
      tags:
        - Products
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '200':
          description: Product updated

    delete:
      summary: Delete product
      description: Delete a product (Missing auth check)
      tags:
        - Products
      security: []  # No authentication required!
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Product deleted

  /users:
    get:
      summary: List users
      description: Returns list of all users (Admin only)
      tags:
        - Users
      parameters:
        - name: role
          in: query
          description: Filter by role
          schema:
            type: string
            enum: [admin, user, guest]
      responses:
        '200':
          description: Successful response

    post:
      summary: Create user
      description: Register a new user (Mass assignment vulnerable)
      tags:
        - Users
      security: []  # Public endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                role:
                  type: string
                  description: User role (should not be user-settable)
                is_admin:
                  type: boolean
                  description: Admin flag (should not be user-settable)
              required:
                - username
                - email
                - password
      responses:
        '201':
          description: User created

  /users/{user_id}:
    get:
      summary: Get user profile
      description: Get user by ID (IDOR vulnerable)
      tags:
        - Users
      parameters:
        - name: user_id
          in: path
          required: true
          description: User ID (vulnerable to IDOR)
          schema:
            type: string
      responses:
        '200':
          description: Successful response

  /admin/users:
    get:
      summary: Admin user list
      description: List all users for admin (No auth check!)
      tags:
        - Admin
      security: []  # Missing authentication!
      responses:
        '200':
          description: Successful response

  /admin/config:
    get:
      summary: Get system configuration
      description: System configuration (No auth!)
      tags:
        - Admin
      security: []
      responses:
        '200':
          description: Configuration retrieved

  /auth/login:
    post:
      summary: User login
      description: Authenticate user and get token
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required:
                - username
                - password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'

  /search:
    get:
      summary: Search
      description: Search endpoint with reflected XSS vulnerability
      tags:
        - Search
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (reflected in response)
          schema:
            type: string
        - name: callback
          in: query
          description: JSONP callback function name
          schema:
            type: string
      responses:
        '200':
          description: Search results

components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        category:
          type: string
        in_stock:
          type: boolean

    ProductInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        html_content:
          type: string
          description: HTML content for product page (XSS risk!)

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
        created_at:
          type: string
          format: date-time

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKey:
      type: apiKey
      in: query
      name: api_key

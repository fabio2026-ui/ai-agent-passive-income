<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      background: #f5f5f5;
    }
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .header h1 {
      font-size: 20px;
      margin-bottom: 8px;
    }
    .header p {
      color: #666;
      font-size: 14px;
    }
    .section {
      background: white;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .section h3 {
      font-size: 14px;
      margin-bottom: 12px;
      color: #333;
    }
    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .checkbox-item input {
      width: 18px;
      height: 18px;
    }
    .checkbox-item label {
      font-size: 14px;
      color: #333;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-primary {
      background: #007AFF;
      color: white;
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      margin-top: 8px;
    }
    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }
    .feature {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 6px;
      text-align: center;
    }
    .feature-icon {
      font-size: 24px;
      margin-bottom: 4px;
    }
    .feature-text {
      font-size: 12px;
      color: #666;
    }
    .pricing {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
    }
    .pricing h3 {
      color: white;
      margin-bottom: 8px;
    }
    .price {
      font-size: 28px;
      font-weight: bold;
    }
    .price span {
      font-size: 14px;
      font-weight: normal;
    }
    #status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      display: none;
    }
    #status.success {
      display: block;
      background: #d4edda;
      color: #155724;
    }
    #status.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎨 Design System Generator</h1>
    <p>一键生成完整的设计系统</p>
  </div>

  <div class="section">
    <h3>选择要生成的内容</h3>
    <div class="checkbox-group">
      <div class="checkbox-item">
        <input type="checkbox" id="colors" checked>
        <label for="colors">🎨 颜色系统 (14个颜色)</label>
      </div>
      <div class="checkbox-item">
        <input type="checkbox" id="typography" checked>
        <label for="typography">🔤 字体层级 (10个层级)</label>
      </div>
      <div class="checkbox-item">
        <input type="checkbox" id="spacing" checked>
        <label for="spacing">📏 间距系统 (12个间距)</label>
      </div>
      <div class="checkbox-item">
        <input type="checkbox" id="shadows" checked>
        <label for="shadows">☁️ 阴影样式 (5个阴影)</label>
      </div>
      <div class="checkbox-item">
        <input type="checkbox" id="components" checked>
        <label for="components">🧩 基础组件 (按钮/输入框/卡片)</label>
      </div>
    </div>
  </div>

  <button class="btn btn-primary" id="generateBtn">
    ✨ 生成设计系统
  </button>

  <button class="btn btn-secondary" id="exportBtn">
    📤 导出样式代码
  </button>

  <div id="status"></div>

  <div class="features">
    <div class="feature">
      <div class="feature-icon">⚡</div>
      <div class="feature-text">秒级生成</div>
    </div>
    <div class="feature">
      <div class="feature-icon">🎯</div>
      <div class="feature-text">专业规范</div>
    </div>
    <div class="feature">
      <div class="feature-icon">🔄</div>
      <div class="feature-text">自动同步</div>
    </div>
    <div class="feature">
      <div class="feature-icon">💾</div>
      <div class="feature-text">一键导出</div>
    </div>
  </div>

  <div class="section pricing">
    <h3>⭐ Pro 版本</h3>
    <div class="price">€9 <span>/ 一次性</span></div>
    <p style="margin-top: 8px; font-size: 12px;">
      高级组件库 + 主题定制 + 代码导出
    </p>
  </div>

  <script>
    document.getElementById('generateBtn').addEventListener('click', () => {
      const options = {
        colors: document.getElementById('colors').checked,
        typography: document.getElementById('typography').checked,
        spacing: document.getElementById('spacing').checked,
        shadows: document.getElementById('shadows').checked,
        components: document.getElementById('components').checked
      };
      
      parent.postMessage({
        pluginMessage: {
          type: 'generate-design-system',
          options: options
        }
      }, '*');
      
      showStatus('正在生成设计系统...', 'loading');
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
      parent.postMessage({
        pluginMessage: {
          type: 'export-styles'
        }
      }, '*');
      
      showStatus('正在导出样式...', 'loading');
    });

    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = type;
    }

    // 监听来自插件代码的消息
    onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (msg.type === 'design-system-created') {
        showStatus('✅ ' + msg.message, 'success');
      } else if (msg.type === 'styles-exported') {
        showStatus(`✅ 已导出 ${msg.data.colors} 个颜色, ${msg.data.typography} 个字体样式`, 'success');
      }
    };
  </script>
</body>
</html>

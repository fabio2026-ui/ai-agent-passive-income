# Cloudflare Workers配置
name = "tax-api-aggregator"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# 环境变量 (生产环境需要在Cloudflare Dashboard设置)
[vars]
STRIPE_PRICE_ID = "price_monthly_29"
API_VERSION = "v1"

#  secrets (使用 wrangler secret put 设置)
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# JWT_SECRET

# D1 数据库
[[d1_databases]]
binding = "DB"
database_name = "tax-api-db"
database_id = "your-database-id-here"

# KV 缓存
[[kv_namespaces]]
binding = "CACHE"
id = "your-kv-namespace-id"

# 速率限制配置
[limits]
cpu_ms = 50

# 路由规则
[[routes]]
pattern = "api.taxaggregator.eu/*"
custom_domain = true
# Breath AI - 首单监控系统配置文件
# 创建时间: 2026-03-21

[monitor]
projects = [
    "eu-crossborder",
    "uk-crossborder", 
    "us-tax-api",
    "canada-tax-api",
    "amazon-calculator",
    "shopify-calculator",
    "mentalhealth-gpt",
    "notion-templates",
    "breath-ai"
]
notification_email = "ai_67dd6c1a002c@sharebot.net"
check_interval_minutes = 5

[breath-ai]
name = "Breath AI"
product_keywords = ["breath", "breath ai", "breathing", "respiratory"]
price_usd = 19.99
currency = "USD"
payment_type = "one_time"
platforms = ["stripe", "gumroad"]

[stripe]
enabled = true
webhook_secret = ""
api_key_path = "/root/.openclaw/workspace/.stripe-secret"

[notification]
type = "email"
subject_template = "🎉 首单到账！{product_name} 收入 ${amount}"
body_template = """
🎉 恭喜！收到新订单！

产品: {product_name}
金额: ${amount} {currency}
客户: {customer_email}
时间: {timestamp}
平台: {platform}

这是您的第 {order_count} 单！

---
Breath AI 自动监控系统
"""

[log]
file = "/root/.openclaw/workspace/logs/first-sale-monitor.log"
level = "INFO"

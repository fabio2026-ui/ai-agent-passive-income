name = "breath-ai-backend"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Environment variables (set these in Cloudflare dashboard)
[vars]
STRIPE_PUBLISHABLE_KEY = "pk_test_51TCfcBDRLWt3rKvbzr3TuuA2pZ4rUOyBExwBUOpGVY9pK8zKfPTGT9A5oxmmBTI7Asf1M5ozadpHTFSlQ1WTyMKG00rQNT5CxB"

# Secrets (use wrangler secret put to set these)
# STRIPE_SECRET_KEY - set via: wrangler secret put STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET - set via: wrangler secret put STRIPE_WEBHOOK_SECRET

# KV Namespaces
[[kv_namespaces]]
binding = "SUBSCRIPTIONS"
id = "a20d6fe95e9c41988c488f3dc1f549ad"

[[kv_namespaces]]
binding = "DUO_SESSIONS"
id = "cefce67078ce44d8a916f16f0b64fbeb"

# Durable Objects (for WebRTC signaling)
[[durable_objects.bindings]]
name = "SIGNAL_QUEUE"
class_name = "SignalQueue"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SignalQueue"]

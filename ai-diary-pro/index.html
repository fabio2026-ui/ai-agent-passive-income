<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="description" content="AI日记Pro - 智能情绪记录与AI总结分析，帮助你更好地了解自己" />
    <meta name="keywords" content="日记,情绪记录,AI分析,心理健康,情绪追踪" />
    
    <!-- Performance Optimizations -->
    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    
    <!-- Resource hints -->
    <meta http-equiv="x-dns-prefetch-control" content="on" />
    
    <!-- PWA Icons -->
    <link rel="apple-touch-icon" href="/pwa-192x192.png" sizes="192x192" />
    <link rel="mask-icon" href="/mask-icon.svg" color="#6366f1" />
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <title>AI日记Pro</title>
    
    <!-- Critical CSS for above-the-fold content -->
    <style>
      /* Critical rendering path styles */
      html { background-color: #fafafa; }
      body { 
        margin: 0; 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { min-height: 100vh; }
      /* Loading skeleton */
      .initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #eef2ff 0%, #f5f3ff 100%);
      }
      .initial-loader__spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #6366f1;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Initial loader for better perceived performance -->
      <div class="initial-loader" id="initial-loader">
        <div class="initial-loader__spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove initial loader when app is ready
      window.addEventListener('load', function() {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.3s ease';
          setTimeout(() => loader.remove(), 300);
        }
      });
    </script>
  </body>
</html>
